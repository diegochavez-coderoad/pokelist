<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-labelledby="title desc">
  <title id="title">Pokelist Hero Banner</title>
  <desc id="desc">Pokelist title with Gen 1 Pokemon Search subtitle and a Pokeball icon.</desc>
  <defs>
    <radialGradient id="glowLeft" cx="10%" cy="0%" r="36%">
      <stop offset="0%" stop-color="#6684ad" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#6684ad" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="100%" cy="20%" r="42%">
      <stop offset="0%" stop-color="#567666" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#567666" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ballTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5f5f"/>
      <stop offset="100%" stop-color="#d60f1f"/>
    </linearGradient>
    <linearGradient id="ballBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d9d9d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="320" fill="#0b1118" rx="14"/>
  <rect x="0" y="0" width="1280" height="320" fill="url(#glowLeft)" rx="14"/>
  <rect x="0" y="0" width="1280" height="320" fill="url(#glowRight)" rx="14"/>

  <text x="640" y="138" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="96" font-weight="700" fill="#f5f5f5">Pokelist</text>
  <text x="640" y="222" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="600" fill="#f1f1f1">Gen 1 Pokemon Search</text>

  <g transform="translate(1088,72)" filter="url(#shadow)">
    <circle cx="80" cy="80" r="76" fill="#1f1f1f"/>
    <path d="M4 80 A76 76 0 0 1 156 80 L156 80 L4 80 Z" fill="url(#ballTop)"/>
    <path d="M4 80 A76 76 0 0 0 156 80 L156 80 L4 80 Z" fill="url(#ballBottom)"/>
    <rect x="4" y="72" width="152" height="16" fill="#1f1f1f"/>
    <circle cx="80" cy="80" r="28" fill="#1f1f1f"/>
    <circle cx="80" cy="80" r="18" fill="#f5f5f5"/>
    <circle cx="80" cy="80" r="10" fill="#d5d5d5"/>
  </g>
</svg>
